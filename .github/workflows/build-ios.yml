name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Capacitor iOS
        run: npm install @capacitor/ios@6

      - name: Adicionar plataforma iOS
        run: npx cap add ios

      - name: Sincronizar arquivos web
        run: npx cap sync ios

      - name: Liberar HTTP no iOS (desativar ATS)
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"

      - name: Aplicar patch de Basic Auth no ViewController
        run: bash patch-ios-auth.sh

      - name: Instalar CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS (simulador)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | grep -E "(error:|BUILD FAILED|BUILD SUCCEEDED)"

      - name: Empacotar .app em .zip para Appetize
        run: |
          cd build/Build/Products/Release-iphonesimulator
          zip -r VendasRicoy.zip App.app

      - name: Publicar app como artefato
        uses: actions/upload-artifact@v4
        with:
          name: VendasRicoy-iOS
          path: build/Build/Products/Release-iphonesimulator/VendasRicoy.zip
          retention-days: 7
