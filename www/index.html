<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas Ricoy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #loading { color: #fff; font-size: 18px; text-align: center; }
    #loading img { width: 80px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
    iframe { width: 100vw; height: 100vh; border: none; display: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid #ffffff33; border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando Vendas Ricoy...</p>
  </div>
  <iframe id="app"></iframe>

  <script>
    const url = 'http://vendas.ricoy.com.br:5050/vendas';
    const user = 'admin';
    const pass = 'Ricoy123';

    async function loadWithAuth() {
      try {
        const response = await fetch(url, {
          headers: {
            'Authorization': 'Basic ' + btoa(user + ':' + pass)
          }
        });
        if (response.ok) {
          const html = await response.text();
          const blob = new Blob([html], { type: 'text/html' });
          const blobUrl = URL.createObjectURL(blob);
          const iframe = document.getElementById('app');
          iframe.src = blobUrl;
          iframe.style.display = 'block';
          document.getElementById('loading').style.display = 'none';
        } else {
          showError('Erro ao autenticar: ' + response.status);
        }
      } catch (e) {
        showError('Erro de conexão: ' + e.message);
      }
    }

    function showError(msg) {
      document.getElementById('loading').innerHTML = '<p style="color:#ff6b6b">⚠ ' + msg + '</p><br><button onclick="loadWithAuth()" style="padding:10px 20px;background:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px">Tentar novamente</button>';
    }

    loadWithAuth();
  </script>
</body>
</html>
