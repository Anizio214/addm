<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vendas Ricoy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #loading { color: #fff; font-size: 18px; text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .spinner { width: 40px; height: 40px; border: 4px solid #ffffff33; border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando Vendas Ricoy...</p>
  </div>
  <script>
    window.location.replace('http://vendas.ricoy.com.br:5050/vendas');
  </script>
</body>
</html>
