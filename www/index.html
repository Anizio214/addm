<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vendas Ricoy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #loading { color: #fff; font-size: 18px; text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .spinner { width: 40px; height: 40px; border: 4px solid #ffffff33; border-top: 4px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #webview { width: 100%; height: 100%; border: none; display: none; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando Vendas Ricoy...</p>
  </div>
  <iframe id="webview" src="http://admin:Ricoy123@vendas.ricoy.com.br:5050/vendas"></iframe>

  <script>
    const iframe = document.getElementById('webview');
    const loading = document.getElementById('loading');

    iframe.onload = function() {
      loading.style.display = 'none';
      iframe.style.display = 'block';
    };

    iframe.onerror = function() {
      loading.innerHTML = '<p style="color:#ff6b6b">Erro de conexao.<br>Verifique a rede.</p><br><button onclick="reload()" style="padding:10px 24px;background:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer">Tentar novamente</button>';
    };

    function reload() {
      loading.innerHTML = '<div class="spinner"></div><p>Carregando Vendas Ricoy...</p>';
      iframe.src = 'http://admin:Ricoy123@vendas.ricoy.com.br:5050/vendas?' + Date.now();
    }

    setTimeout(function() {
      if (iframe.style.display === 'none') {
        iframe.style.display = 'block';
        loading.style.display = 'none';
      }
    }, 8000);
  </script>
</body>
</html>
